<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensajería</title>
<link rel="stylesheet" href="mensajeria.css">
</head>

<body>

<div class="app">

  <div class="header">
    <h2>Chats</h2>
  </div>

  <div class="main">

    <!-- LISTA -->
    <div class="chat-list">
      
      <a href="#sosa" class="chat">
        <img class="prfl1" src="ArcangelUriel-Perfil.jpg">
        <span>Sosa</span>
      </a>

      <a href="#esther" class="chat">
        <img class="prfl1" src="Levi.jpeg">
        <span>Pantufla powers</span>
      </a>

      <a href="#emilio" class="chat">
        <img class="prfl1" src="PatoMago.jpeg">
        <span>Emilio</span>
      </a>

    </div>

    <!-- CHAT SOSA -->
    <div class="chat-view" id="sosa">
      <div class="chat-header">
        <a href="#" class="back">⬅</a>
        Sosa
      </div>

      <div class="messages">
        <div class="msg left">Saca el maicra</div>
        <div class="msg right">De one</div>
      </div>

      <div class="input">
        <input placeholder="Escribe..." disabled>
      </div>
    </div>

    <!-- CHAT ESTHER -->
    <div class="chat-view" id="esther">
      <div class="chat-header">
        <a href="#" class="back">⬅</a>
        Pantufla powers
      </div>

      <div class="messages">
        <div class="msg left">Me pusieron los cuernos</div>
        <div class="msg right">jajajajaa</div>
      </div>

      <div class="input">
        <input placeholder="Escribe..." disabled>
      </div>
    </div>

    <!-- CHAT EMILIO -->
    <div class="chat-view" id="emilio">
      <div class="chat-header">
        <a href="#" class="back">⬅</a>
        Emilio
      </div>

      <div class="messages">
        <div class="msg left">😂😂😂</div>
        <div class="msg right">valio</div>
      </div>

      <div class="input">
        <input placeholder="Escribe..." disabled>
      </div>
    </div>

  </div>

</div>

</body>
</html>
